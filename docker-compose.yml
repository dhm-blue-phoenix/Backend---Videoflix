services:

  db:
    image: postgres:latest
    container_name: videoflix_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql:Z

  redis:
    image: redis:latest
    container_name: videoflix_redis
    volumes:
      - redis_data:/data:Z

  mailhog:
    image: mailhog/mailhog:latest
    container_name: videoflix_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_backend

    volumes:
      - .:/app:Z
      - videoflix_media:/app/media:Z
      - videoflix_static:/app/static:Z
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis




volumes:
  postgres_data:
  redis_data:
  videoflix_media:
  videoflix_static:
